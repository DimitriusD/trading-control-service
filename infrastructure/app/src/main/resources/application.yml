server:
  port: ${APP_PORT:8095}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/catalog}
    username: ${DB_USER:trading}
    password: ${DB_PASSWORD:trading}
  flyway:
    enabled: true
    locations: classpath:db/migration

market-data-service:
  base-url: ${MARKET_DATA_SERVICE_BASE_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"