server:
  port: ${APP_PORT:8095}

spring:
  datasource:
    url: jdbc:postgresql://localhost:${POSTGRES_PORT:5433}/catalog
    username: trading
    password: trading
  flyway:
    enabled: true
    locations: classpath:db/migration

market-data-service:
  base-url: ${MARKET_DATA_SERVICE_BASE_URL:http://localhost:8080}

management:
  endpoints:
    web:
      exposure:
        include: "health,info,metrics"